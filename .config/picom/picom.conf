backend = "glx";

blur: {
    method = "dual_kawase";
    strength = 3;
    background = true;
    background-frame = false;
    background-fixed = false;
};

blur-background-exclude = [
    "class_g = 'Brave-browser'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'tooltip'"
];

corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'dnd'",
  "window_type = 'unknown'",
  "window_type = 'toolbar'",
  "window_type = 'menu'",
  "window_type = 'utility'",
  "window_type = 'splash'",
  "window_type = 'dialog'",
  "window_type = 'normal'",
  "window_type = 'notification'",
  "window_type = 'tooltip'"
];

shadow = true;
shadow-opacity = 0.6;

shadow-exclude = [
    "_GTK_FRAME_EXTENTS@:c",
    "class_g *= 'dwm'",
    "class_g = 'dwmsystray'",
];
